<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <style>
        /* Adicione esta regra ao seu CSS existente para melhor visibilidade do bloqueio */
        .input-bloqueado {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <script>
        // --- ADIÇÃO NECESSÁRIA ---
        let firebaseReady = false; 

        // Função para atualizar o estado da conexão
        function setFirebaseReady(status) {
            firebaseReady = status;
            const loadingScreen = document.getElementById('loading-screen');
            if (status) {
                loadingScreen.style.display = 'none'; // Remove a tela de loading
                renderPalpitar(); // Renderiza os palpites após a conexão
            }
        }

        // --- ATUALIZAÇÃO NO SEU RENDERIZADOR ---
        function renderPalpitar() {
            // ... seu código original ...
            const inputs = document.querySelectorAll('.js input');
            inputs.forEach(input => {
                input.disabled = !firebaseReady; // Bloqueia se não estiver pronto
                if (!firebaseReady) {
                    input.classList.add('input-bloqueado');
                } else {
                    input.classList.remove('input-bloqueado');
                }
            });
        }

        // --- SIMULAÇÃO DE CONEXÃO COM FIREBASE ---
        // Quando o Firebase terminar de carregar, chame esta função:
        firebase.initializeApp(FIREBASE_CONFIG);
        firebase.database().ref('.info/connected').on('value', function(snapshot) {
            if (snapshot.val() === true) {
                setFirebaseReady(true);
            }
        });
    </script>
</body>
</html>
